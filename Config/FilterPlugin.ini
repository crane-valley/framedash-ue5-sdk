[FilterPlugin]
; Extra files RunUAT BuildPlugin stages into the packaged plugin. Source/,
; Config/, Resources/, and Content/ are included automatically; the root-level
; license and docs are not, so without these entries a redistributable build
; would drop the MIT license and the nanopb (zlib) attribution. Listing this
; file also stops UAT from writing its own default template into the tracked
; source tree on every build.
/LICENSE
/THIRD-PARTY-NOTICES.txt
/README.md
/CHANGELOG.md
